services:
  postgres:
    build:
      context: .
      dockerfile: dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-app}_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ecommerce_dev}
    ports:
      - "${DB_PORT_DOCKER:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.6-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT_DOCKER:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: ${COMPOSE_PROJECT_NAME:-app}_prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
